<main class="pagina">
  <header class="cabecalho">
    <h1 class="titulo">Configurações</h1>
    <p class="subtitulo">Gerencie as informações da sua conta</p>
  </header>

  <section class="card-perfil">
    <div class="card-perfil-header">
      <div class="perfil-avatar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="perfil-titulo">
        <strong>Dados do perfil</strong>
        <span>Suas informações pessoais cadastradas</span>
      </div>
    </div>

    <div class="card-perfil-body">
      <div class="campo">
        <label class="campo-label">Nome completo</label>
        @if (editando()) {
          <input
            #inputNome
            class="campo-input"
            type="text"
            [(ngModel)]="nomeEditado"
            (keydown.enter)="salvar()"
            (keydown.escape)="cancelarEdicao()"
            [disabled]="salvando()"
          />
        } @else {
          <p class="campo-valor campo-valor--destaque">{{ usuario()?.nome }}</p>
        }
      </div>

      <div class="campo">
        <label class="campo-label">E-mail</label>
        <div class="campo-input-readonly">{{ usuario()?.email }}</div>
      </div>

      <div class="campo">
        <label class="campo-label">Tipo de usuário</label>
        <div class="campo-input-readonly">{{ roleFmt() }}</div>
      </div>
    </div>

    @if (erroMensagem()) {
      <div class="erro-mensagem">{{ erroMensagem() }}</div>
    }

    <div class="card-perfil-footer">
      @if (editando()) {
        <div class="footer-acoes">
          <button class="btn-salvar" type="button" (click)="salvar()" [disabled]="salvando()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            {{ salvando() ? 'Salvando...' : 'Salvar alterações' }}
          </button>
          <button class="btn-cancelar" type="button" (click)="cancelarEdicao()" [disabled]="salvando()">
            Cancelar
          </button>
        </div>
      } @else {
        <button class="btn-editar" type="button" (click)="entrarEdicao()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Editar perfil
        </button>
      }
    </div>
  </section>
</main>
